  - id: 1-db
    title: DB 스키마 + RLS + 트리거 + Storage 버킷 적용
    status: done
    depends_on: [0-scaffold]
    outputs: [schema.sql 적용 완료, photos 버킷 생성, realtime publication 등록]
    evidence: "재실행 후 7개 테이블 전부 조회 성공, storage 버킷/정책 및 realtime publication을 e2e 스크립트로 실측 검증."

